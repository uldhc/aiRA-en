<header class="site-header">
    <div class="site-header-bright-line"></div>

  <div class="site-header-top-line"></div>

  <div class="site-header-inner">
    <a class="brand" target="_blank" href="https://www.hzf.lu.lv/par-mums/centri/digitalo-humanitaro-zinatnu-centrs/">
      <img
        class="brand-logo"
        src="assets/images/LU_logo.png"
        alt="Latvijas Universitāte"
      >
      
    </a>
    
    <nav class="header-actions" aria-label="Galvenes darbības">
      <a class="header-action" href="#" aria-label="Palīdzība">
        <mat-icon>info_outline</mat-icon>
        <span>Info</span>
      </a>
      @if (showLanguageButton) {
        <a class="language-button" href="https://uldhc.github.io/aiRA/" aria-label="Mainīt valodu">
          <mat-icon>language</mat-icon>
          <span>EN</span>
        </a>
      }
    </nav>
  </div>
</header>
